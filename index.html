        body {
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2b1d14; /* สีน้ำตาลเข้มแบบไทย */
            background-image: radial-gradient(#4a3525 20%, transparent 20%),
                              radial-gradient(#4a3525 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: #f4ebd0; /* สีครีมงาช้าง */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1a3c20; /* สีเขียวใบตองเข้ม/เขียวไทย */
            border: 4px solid #d4af37; /* ขอบสีทอง */
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
            padding: 30px;
            max-width: 800px;
            width: 90%;
            text-align: center;
            position: relative;
        }
        .container::before {
            content: "◆";
            color: #d4af37;
            font-size: 24px;
            position: absolute;
            top: 10px;
            left: 15px;
        }
        .container::after {
            content: "◆";
            color: #d4af37;
            font-size: 24px;
            position: absolute;
            top: 10px;
            right: 15px;
        }
        h1 {
            color: #d4af37; /* สีทอง */
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
            letter-spacing: 1px;
            font-weight: bold;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* อัตราส่วน 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            border: 2px solid #d4af37; /* ขอบวิดีโอสีทอง */
            background-color: #000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .info-panel {
            margin-top: 25px;
            display: flex;
            justify-content: center; /* ปรับให้อยู่ตรงกลางอย่างสวยงามเมื่อไม่มีปุ่ม */
            align-items: center;
            border-top: 2px dashed #d4af37; /* เส้นประสีทอง */
            padding-top: 20px;
        }
        .view-count {
            font-size: 1.3rem;
            color: #f4ebd0;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            background-color: rgba(0, 0, 0, 0.2);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .view-count span {
            color: #d4af37; /* ยอดวิวสีทองเด่น */
            font-size: 1.7rem;
            font-weight: bold;
            margin: 0 8px;
        }
    </style>
</head>
