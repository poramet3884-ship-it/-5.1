<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>วิดีโอแนะนำศัพสังคีตดนตรีไทยเครื่อง ดีด</title>
    <style>
        body {
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2b1d14; /* สีน้ำตาลเข้มแบบไทย */
            background-image: radial-gradient(#4a3525 20%, transparent 20%),
                              radial-gradient(#4a3525 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: #f4ebd0; /* สีครีมงาช้าง */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1a3c20; /* สีเขียวใบตองเข้ม/เขียวไทย */
            border: 4px solid #d4af37; /* ขอบสีทอง */
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
            padding: 30px;
            max-width: 800px;
            width: 90%;
            text-align: center;
            position: relative;
        }
        .container::before {
            content: "◆";
            color: #d4af37;
            font-size: 24px;
            position: absolute;
            top: 10px;
            left: 15px;
        }
        .container::after {
            content: "◆";
            color: #d4af37;
            font-size: 24px;
            position: absolute;
            top: 10px;
            right: 15px;
        }
        h1 {
            color: #d4af37; /* สีทอง */
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
            letter-spacing: 1px;
            font-weight: bold;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* อัตราส่วน 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            border: 2px solid #d4af37; /* ขอบวิดีโอสีทอง */
            background-color: #000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .info-panel {
            margin-top: 25px;
            display: flex;
            justify-content: space-between; /* จัดให้ยอดวิวอยู่ซ้าย ปุ่มรีเซ็ตอยู่ขวา */
            align-items: center;
            border-top: 2px dashed #d4af37; /* เส้นประสีทอง */
            padding-top: 20px;
        }
        .view-count {
            font-size: 1.2rem;
            color: #f4ebd0;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            background-color: rgba(0, 0, 0, 0.2);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .view-count span {
            color: #d4af37; /* ยอดวิวสีทองเด่น */
            font-size: 1.6rem;
            font-weight: bold;
            margin: 0 8px;
        }
        .btn-reset {
            background-color: #4a3525; /* ปุ่มสีน้ำตาล */
            color: #d4af37; /* ตัวอักษรสีทอง */
            border: 1px solid #d4af37;
            padding: 8px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .btn-reset:hover {
            background-color: #d4af37; /* เปลี่ยนเป็นสีทองตอนเอาเมาส์ชี้ */
            color: #1a3c20; /* ตัวอักษรเปลี่ยนเป็นสีเขียว */
            font-weight: bold;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ วิดีโอแนะนำทรัพย์สังคีตดนตรีไทยเครื่อง ดีด ✨</h1>
    
    <div class="video-wrapper">
        <video id="myVideo" controls preload="auto">
            <source src="video1.mp4" type="video/mp4">
            เบราว์เซอร์ของคุณไม่รองรับการเล่นวิดีโอนี้
        </video>
    </div>

    <div class="info-panel">
        <div class="view-count">
            👁️ ยอดผู้เข้าชมสะสม: <span id="viewCount">0</span> ครั้ง
        </div>
        <button class="btn-reset" onclick="resetViewsWithPassword()">🔄 รีเซ็ตยอดวิว</button>
    </div>
</div>

<script>
    // ฟังก์ชันนับและแสดงยอดวิวสะสม
    function updateViews() {
        let currentViews = localStorage.getItem('thaiVideoViews_secure');
        
        if (currentViews === null) {
            currentViews = 1;
        } else {
            currentViews = parseInt(currentViews) + 1;
        }
        
        localStorage.setItem('thaiVideoViews_secure', currentViews);
        document.getElementById('viewCount').innerText = currentViews.toLocaleString();
    }

    // ฟังก์ชันสำหรับรีเซ็ตยอดวิวที่ต้องกรอกรหัสผ่าน
    function resetViewsWithPassword() {
        // แอบถามรหัสผ่านผ่านกล่องข้อความ Prompt
        let passwordInput = prompt("กรุณาใส่รหัสผ่านเพื่อรีเซ็ตยอดผู้เข้าชม:");
        
        // ตรวจสอบรหัสผ่านที่ตั้งไว้คือ 1423po
        if (passwordInput === "1423po") {
            localStorage.setItem('thaiVideoViews_secure', 0);
            document.getElementById('viewCount').innerText = 0;
            alert("รีเซ็ตยอดผู้เข้าชมเรียบร้อยแล้วเป็น 0 ครั้ง");
        } else if (passwordInput !== null) {
            // ถ้ากรอกรหัสผิดและไม่ได้กดยกเลิก
            alert("รหัสผ่านไม่ถูกต้อง! ไม่สามารถรีเซ็ตข้อมูลได้");
        }
    }

    // เรียกใช้งานเมื่อโหลดหน้าเว็บสำเร็จ
    window.onload = updateViews;
</script>

</body>
</html>
