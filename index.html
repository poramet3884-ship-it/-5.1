<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>วิดีโอแนะนำทรัพย์สังคีตดนตรีไทยเครื่อง ดีด</title>
    <style>
        body {
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2b1d14; /* สีน้ำตาลเข้มแบบไทย */
            background-image: radial-gradient(#4a3525 20%, transparent 20%),
                              radial-gradient(#4a3525 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: #f4ebd0; /* สีครีมงาช้าง */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1a3c20; /* สีเขียวใบตองเข้ม/เขียวไทย */
            border: 4px solid #d4af37; /* ขอบสีทอง */
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
            padding: 30px;
            max-width: 800px;
            width: 90%;
            text-align: center;
            position: relative;
        }
        .container::before {
            content: "◆";
            color: #d4af37;
            font-size: 24px;
            position: absolute;
            top: 10px;
            left: 15px;
        }
        .container::after {
            content: "◆";
            color: #d4af37;
            font-size: 24px;
            position: absolute;
            top: 10px;
            right: 15px;
        }
        h1 {
            color: #d4af37; /* สีทอง */
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
            letter-spacing: 1px;
            font-weight: bold;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* อัตราส่วน 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            border: 2px solid #d4af37; /* ขอบวิดีโอสีทอง */
            background-color: #000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .info-panel {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px dashed #d4af37; /* เส้นประสีทอง */
            padding-top: 20px;
        }
        .view-count {
            font-size: 1.2rem;
            color: #f4ebd0;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        .view-count span {
            color: #d4af37; /* ยอดวิวสีทองเด่น */
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0 5px;
        }
        .btn-reset {
            background-color: #4a3525; /* ปุ่มสีน้ำตาล */
            color: #d4af37; /* ตัวอักษรสีทอง */
            border: 1px solid #d4af37;
            padding: 8px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .btn-reset:hover {
            background-color: #d4af37; /* เปลี่ยนเป็นสีทองตอนเอาเมาส์ชี้ */
            color: #1a3c20; /* ตัวอักษรเปลี่ยนเป็นสีเขียว */
            font-weight: bold;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ วิดีโอแนะนำทรัพย์สังคีตดนตรีไทยเครื่อง ดีด ✨</h1>
    
    <div class="video-wrapper">
        <video id="myVideo" controls preload="auto">
            <source src="https://cdn.jsdelivr.net/gh/poramet3844-ship-it/-5.1@main/video1.mp4" type="video/mp4">
            เบราว์เซอร์ของคุณไม่รองรับการเล่นวิดีโอนี้
        </video>
    </div>

    <div class="info-panel">
        <div class="view-count">
            ยอดผู้เข้าชม: <span id="viewCount">0</span> ครั้ง
        </div>
        <button class="btn-reset" onclick="resetViews()">🔄 รีเซ็ตยอดวิว</button>
    </div>
</div>

<script>
    function updateViews() {
        let currentViews = localStorage.getItem('videoViews');
        
        if (currentViews === null) {
            currentViews = 1;
        } else {
            currentViews = parseInt(currentViews) + 1;
        }
        
        localStorage.setItem('videoViews', currentViews);
        document.getElementById('viewCount').innerText = currentViews.toLocaleString();
    }

    function resetViews() {
        if(confirm("คุณต้องการรีเซ็ตยอดผู้เข้าชมใช่หรือไม่?")) {
            localStorage.setItem('videoViews', 0);
            document.getElementById('viewCount').innerText = 0;
        }
    }

    window.onload = updateViews;
</script>

</body>
</html>
